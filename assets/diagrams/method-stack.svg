<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" role="img" aria-labelledby="title desc">
  <title id="title">Duty Loops method stack</title>
  <desc id="desc">Duty Loops combines prompt engineering, skill design, context engineering, and thin loop control.</desc>
  <defs>
    <style>
      .title{font:800 34px Inter,Arial,sans-serif;fill:#17212b}
      .label{font:800 25px Inter,Arial,sans-serif;fill:#17212b}
      .small{font:500 17px Inter,Arial,sans-serif;fill:#51606d}
    </style>
  </defs>
  <rect width="980" height="640" fill="#f7f9fb"/>
  <text x="68" y="78" class="title">Loop Engineering, Without The Heavy Platform</text>
  <text x="68" y="114" class="small">Duty Loops keeps the engineered parts narrow and lets the model handle judgment.</text>

  <g transform="translate(128 164)">
    <rect width="724" height="78" rx="14" fill="#ffffff" stroke="#d6dde4" stroke-width="2"/>
    <circle cx="42" cy="39" r="14" fill="#10a7ad"/>
    <text x="76" y="34" class="label">Prompt Engineering</text>
    <text x="76" y="60" class="small">task frame, role, output contract</text>
  </g>
  <g transform="translate(128 262)">
    <rect width="724" height="78" rx="14" fill="#ffffff" stroke="#d6dde4" stroke-width="2"/>
    <circle cx="42" cy="39" r="14" fill="#10a7ad"/>
    <text x="76" y="34" class="label">Skill Design</text>
    <text x="76" y="60" class="small">reusable operating procedure for Codex and Claude</text>
  </g>
  <g transform="translate(128 360)">
    <rect width="724" height="78" rx="14" fill="#ffffff" stroke="#d6dde4" stroke-width="2"/>
    <circle cx="42" cy="39" r="14" fill="#f2a900"/>
    <text x="76" y="34" class="label">Context Engineering</text>
    <text x="76" y="60" class="small">fresh facts, state, source health, recent runs</text>
  </g>
  <g transform="translate(128 458)">
    <rect width="724" height="92" rx="14" fill="#17212b"/>
    <circle cx="42" cy="46" r="14" fill="#f2a900"/>
    <text x="76" y="40" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="800">Loop / Control Engineering</text>
    <text x="76" y="68" fill="#d8e4ec" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500">wakeup, decision, gates, notification, writeback, review</text>
  </g>

  <path d="M852 202c54 22 78 70 78 154s-24 132-78 154" fill="none" stroke="#10a7ad" stroke-width="5" stroke-linecap="round"/>
  <text x="654" y="588" fill="#17212b" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800">Scene-specific worker</text>
  <text x="654" y="614" class="small">not a generic chatbot</text>
</svg>
