<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 300" role="img" aria-labelledby="title desc">
  <title id="title">Duty Loops logo</title>
  <desc id="desc">Duty Loops wordmark with a bold agent-core loop mark.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="44%" r="62%">
      <stop offset="0" stop-color="#1734ff"/>
      <stop offset=".42" stop-color="#090d2f"/>
      <stop offset="1" stop-color="#020417"/>
    </radialGradient>
    <linearGradient id="word" x1="300" y1="80" x2="760" y2="160">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset=".52" stop-color="#1727ff"/>
      <stop offset="1" stop-color="#7b1dff"/>
    </linearGradient>
    <linearGradient id="accent" x1="300" y1="212" x2="840" y2="212">
      <stop offset="0" stop-color="#0df5ff"/>
      <stop offset=".5" stop-color="#ff2bc2"/>
      <stop offset="1" stop-color="#ffb000"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.86 0 0 0 0 1.00 0 0 0 .50 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1060" height="300" rx="42" fill="#ffffff"/>
  <g transform="translate(44 38) scale(.44)">
    <rect width="512" height="512" rx="96" fill="#ffffff"/>
    <circle cx="256" cy="256" r="106" fill="url(#core)"/>
    <path d="M170 104a178 178 0 0 1 172 0" fill="none" stroke="#070b22" stroke-width="16" stroke-linecap="round"/>
    <path d="M408 168a178 178 0 0 1 0 176" fill="none" stroke="#070b22" stroke-width="16" stroke-linecap="round" stroke-dasharray="72 26"/>
    <path d="M342 408a178 178 0 0 1-172 0" fill="none" stroke="#070b22" stroke-width="16" stroke-linecap="round"/>
    <path d="M104 344a178 178 0 0 1 0-176" fill="none" stroke="#070b22" stroke-width="16" stroke-linecap="round" stroke-dasharray="72 26"/>
    <path d="M166 112a180 180 0 0 1 92-34" fill="none" stroke="#0df5ff" stroke-width="9" stroke-linecap="round"/>
    <path d="M428 252a180 180 0 0 1-36 108" fill="none" stroke="#19e07f" stroke-width="9" stroke-linecap="round"/>
    <path d="M84 260a180 180 0 0 1 36-108" fill="none" stroke="#2c55ff" stroke-width="9" stroke-linecap="round"/>
    <path d="M202 230l54-36 54 36v68l-54 36-54-36z" fill="none" stroke="#08d9ff" stroke-width="11" stroke-linejoin="round"/>
    <path d="M256 196v60l-54 42M256 256l54 42" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="256" cy="256" r="31" fill="#ffb000" filter="url(#glow)"/>
    <circle cx="256" cy="166" r="25" fill="#00ffd1" filter="url(#glow)"/>
    <circle cx="166" cy="286" r="25" fill="#00d7ff" filter="url(#glow)"/>
    <circle cx="346" cy="286" r="25" fill="#ff2bc2" filter="url(#glow)"/>
    <circle cx="256" cy="166" r="10" fill="#ffffff" opacity=".55"/>
    <circle cx="256" cy="72" r="27" fill="#ff5a1f"/>
    <circle cx="76" cy="356" r="27" fill="#2c55ff"/>
    <circle cx="436" cy="356" r="27" fill="#19e07f"/>
  </g>
  <text x="300" y="122" fill="url(#word)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="850">Duty Loops</text>
  <text x="304" y="174" fill="#445161" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="560">Scene-specific AI workers for Codex and Claude</text>
  <path d="M304 212h496" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="836" cy="212" r="9" fill="#ff5a1f"/>
  <circle cx="870" cy="212" r="9" fill="#00ffd1"/>
  <circle cx="904" cy="212" r="9" fill="#ff2bc2"/>
